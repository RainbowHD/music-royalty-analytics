name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dbt
        run: uv pip install dbt-snowflake==1.7.0 --system

      - name: Create profiles.yml
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: |
          mkdir -p ~/.dbt
          echo "dbt_music_analytics:" > ~/.dbt/profiles.yml
          echo "  target: dev" >> ~/.dbt/profiles.yml
          echo "  outputs:" >> ~/.dbt/profiles.yml
          echo "    dev:" >> ~/.dbt/profiles.yml
          echo "      type: snowflake" >> ~/.dbt/profiles.yml
          echo "      account: ${SNOWFLAKE_ACCOUNT}" >> ~/.dbt/profiles.yml
          echo "      user: ${SNOWFLAKE_USER}" >> ~/.dbt/profiles.yml
          echo "      password: ${SNOWFLAKE_PASSWORD}" >> ~/.dbt/profiles.yml
          echo "      role: ${SNOWFLAKE_ROLE}" >> ~/.dbt/profiles.yml
          echo "      warehouse: music_wh" >> ~/.dbt/profiles.yml
          echo "      database: music_db" >> ~/.dbt/profiles.yml
          echo "      schema: music_schema" >> ~/.dbt/profiles.yml
          echo "      threads: 4" >> ~/.dbt/profiles.yml

      - name: dbt debug
        working-directory: dbt_music_analytics
        run: dbt debug

      - name: dbt run
        working-directory: dbt_music_analytics
        run: dbt run

      - name: dbt test
        working-directory: dbt_music_analytics
        run: dbt test